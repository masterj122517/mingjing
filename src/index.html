<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>明镜 · Mingjing</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <svg class="sidebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
          <span class="sidebar-title">明镜</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>全部任务</span>
            <span class="nav-count" id="count-all">0</span>
          </a>
          <a href="#" class="nav-item" data-view="today">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>今天</span>
            <span class="nav-count" id="count-today">0</span>
          </a>
          <a href="#" class="nav-item" data-view="upcoming">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>计划中</span>
            <span class="nav-count" id="count-upcoming">0</span>
          </a>
          <a href="#" class="nav-item" data-view="completed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>已完成</span>
            <span class="nav-count" id="count-completed">0</span>
          </a>
          <div class="sidebar-divider"></div>
          <div id="category-nav"></div>
          <a href="#" class="nav-item nav-item-add" id="btn-add-category">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>添加分类</span>
          </a>
          <div class="sidebar-divider"></div>
          <div id="goal-nav"></div>
          <a href="#" class="nav-item nav-item-add" id="btn-add-goal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>添加目标</span>
          </a>
        </nav>
      </aside>

      <main id="content">
        <header class="content-header">
          <h1 id="view-title">全部任务</h1>
          <div style="display:flex;align-items:center;gap:8px;">
            <button id="btn-plan" class="btn-analyze" style="display:none;">AI 规划</button>
            <button id="btn-analyze" class="btn-analyze" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
              AI 分析
            </button>
          </div>
        </header>

        <div class="quick-add">
          <div class="quick-add-input-wrapper">
            <span class="quick-add-circle"></span>
            <input type="text" id="quick-add-input" placeholder="添加任务，按 Enter 创建…" autocomplete="off" />
          </div>
          <div class="quick-add-actions" id="quick-add-actions" style="display: none;">
            <input type="date" id="input-due" class="input-sm" />
            <select id="input-priority" class="input-sm">
              <option value="low">低优先级</option>
              <option value="medium" selected>中优先级</option>
              <option value="high">高优先级</option>
            </select>
            <select id="input-goal" class="input-sm">
              <option value="">无目标</option>
            </select>
            <select id="input-category" class="input-sm">
              <option value="">未分类</option>
            </select>
            <input type="text" id="input-tags" class="input-sm" placeholder="标签 (逗号分隔)" />
            <button id="btn-add" class="btn-primary">添加</button>
            <button id="btn-cancel-add" class="btn-ghost">取消</button>
          </div>
        </div>

        <ul id="task-list" class="task-list"></ul>

        <div id="empty-state" class="empty-state" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="empty-icon">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p class="empty-text">暂无任务</p>
          <p class="empty-hint">在上方输入框中添加你的第一个学习任务</p>
        </div>
      </main>
    </div>

    <div id="toast-area"></div>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">添加分类</h3>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <input type="text" id="modal-name" class="modal-name-input" placeholder="分类名称" maxlength="20" autocomplete="off" />
          <div class="modal-icons-label">选择图标</div>
          <div class="modal-icon-grid" id="modal-icon-grid"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-delete-category" id="modal-delete" style="display:none;">删除分类</button>
          <div class="modal-footer-right">
            <button class="btn-ghost" id="modal-cancel">取消</button>
            <button class="btn-primary" id="modal-save" disabled>保存</button>
          </div>
        </div>
      </div>
    </div>

    <div id="goal-modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="goal-modal-title">添加目标</h3>
          <button class="modal-close" id="goal-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <input type="text" id="goal-modal-name" class="modal-name-input" placeholder="目标名称" maxlength="40" autocomplete="off" />
          <input type="text" id="goal-modal-desc" class="modal-name-input" placeholder="描述（可选）" />
          <input type="date" id="goal-modal-date" class="modal-name-input" />
        </div>
        <div class="modal-footer">
          <button class="btn-delete-category" id="goal-modal-delete" style="display:none;">删除目标</button>
          <div class="modal-footer-right">
            <button class="btn-ghost" id="goal-modal-cancel">取消</button>
            <button class="btn-primary" id="goal-modal-save" disabled>保存</button>
          </div>
        </div>
      </div>
    </div>

    <div id="ai-overlay" class="modal-overlay" style="display:none;">
      <div class="modal" style="width:520px;max-height:80vh;overflow-y:auto;">
        <div class="modal-header">
          <h3 class="modal-title">AI 助手</h3>
          <div style="display:flex;align-items:center;gap:8px;">
            <select id="ai-model-select" class="input-sm" style="margin-right:8px;"></select>
            <button class="modal-close" id="ai-close">&times;</button>
          </div>
        </div>
        <div class="modal-body" id="ai-body">
          <div id="ai-analysis" class="ai-section"></div>
          <div class="ai-divider"></div>
          <div id="ai-plan">
            <textarea id="ai-instruction" class="ai-input" placeholder="告诉 AI 你想怎么规划你的学习..." rows="2"></textarea>
            <button class="btn-primary" id="ai-plan-btn" style="margin-top:8px;">生成计划</button>
          </div>
          <div id="ai-suggestions" class="ai-section" style="display:none;"></div>
        </div>
        <div class="modal-footer" style="gap:4px;flex-wrap:wrap;">
          <button class="btn-ghost" id="ai-config-btn">⚙ 模型配置</button>
          <span id="ai-status" style="font-size:12px;color:var(--color-text-hint);"></span>
          <div class="modal-footer-right">
            <button class="btn-ghost" id="ai-close-btn">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="model-overlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">模型配置</h3>
          <button class="modal-close" id="model-close">&times;</button>
        </div>
        <div class="modal-body" id="model-body" style="max-height:50vh;overflow-y:auto;">
          <div id="model-list" class="ai-section"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" id="model-add-custom">+ 自定义模型</button>
          <div class="modal-footer-right">
            <button class="btn-ghost" id="model-cancel">取消</button>
          </div>
        </div>
      </div>
    </div>

    <div id="plan-overlay" class="modal-overlay" style="display:none;">
      <div class="modal" style="width:560px;max-height:85vh;overflow-y:auto;">
        <div class="modal-header">
          <h3 class="modal-title" id="plan-title">AI 学习计划</h3>
          <button class="modal-close" id="plan-close">&times;</button>
        </div>
        <div class="modal-body">
          <textarea id="plan-instruction" class="ai-input" placeholder="描述你的知识水平和学习目标…例如：我完全不懂 Rust，想用2周时间入门到能写简单程序" rows="3"></textarea>
          <button class="btn-primary" id="plan-generate-btn" style="margin-top:8px;margin-bottom:12px;">生成计划</button>
          <div id="plan-status" style="font-size:12px;color:var(--color-text-hint);margin-bottom:8px;"></div>
          <div id="plan-list"></div>
        </div>
        <div class="modal-footer">
          <span id="plan-count" style="font-size:12px;color:var(--color-text-hint);"></span>
          <div class="modal-footer-right">
            <button class="btn-ghost" id="plan-reject" style="display:none;">拒绝全部</button>
            <button class="btn-primary" id="plan-accept" style="display:none;">全部采纳</button>
            <button class="btn-ghost" id="plan-cancel">关闭</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
